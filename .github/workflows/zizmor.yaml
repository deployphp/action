name: Zizmor
on:
  pull_request:
  push:
    branches:
      - master
      - 'releases/*'

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: woodruffw/zizmor-action@v2
